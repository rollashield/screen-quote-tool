<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Rough Estimate - Roll-A-Shield</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .container { max-width: 600px; overflow: visible; }

        .disclaimer {
            background: #fff8e1;
            border: 1px solid #ffcc02;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #665500;
            line-height: 1.4;
        }

        .calc-btn {
            width: 100%;
            padding: 12px;
            background: #0056A3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .calc-btn:hover { background: #003D7A; }

        /* Results */
        .result-card {
            background: #f0f7ff;
            border: 2px solid #0056A3;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0056A3;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #c0d8f0;
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
        }
        .result-total {
            display: flex;
            justify-content: space-between;
            padding: 10px 0 0;
            margin-top: 8px;
            border-top: 2px solid #0056A3;
            font-size: 1.15rem;
            font-weight: 700;
            color: #0056A3;
        }
        .result-price { font-weight: 600; }

        .assumptions {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .assumptions-header {
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }
        .assumptions ul {
            margin: 0;
            padding-left: 18px;
            color: #666;
        }
        .assumptions li { margin-bottom: 2px; }

        .pricing-date {
            margin-top: 12px;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
        }

        .error-message {
            margin-top: 20px;
            padding: 12px 16px;
            background: #fff0f0;
            border: 1px solid #e0a0a0;
            border-radius: 6px;
            color: #c00;
            font-size: 0.9rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #0056A3;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Rough Estimate Calculator</h1>
            <p>Rolling Screens & Shutters</p>
        </div>
        <div class="content">
            <div class="disclaimer">
                This provides a rough estimate only — not a formal quote. Actual pricing may vary based on specific configurations, site conditions, and current availability.
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="productType">Product Type</label>
                    <select id="productType">
                        <option value="screen">Rolling Screen</option>
                        <option value="shutter">Rolling Shutter</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="width">Width (feet)</label>
                    <input type="number" id="width" min="1" max="25" step="0.5" placeholder="e.g. 8">
                </div>
                <div class="form-group">
                    <label for="height">Height (feet)</label>
                    <input type="number" id="height" min="1" max="20" step="0.5" placeholder="e.g. 10">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="operation">Operation</label>
                    <select id="operation">
                        <option value="motorized">Motorized</option>
                        <option value="manual">Manual</option>
                    </select>
                </div>
                <div class="form-group hidden" id="slatGroup">
                    <label for="slatCategory">Slat Type</label>
                    <select id="slatCategory">
                        <option value="foam">Foam-Filled (Insulated)</option>
                        <option value="extruded">Extruded Aluminum</option>
                    </select>
                </div>
            </div>

            <button class="calc-btn" id="calcBtn">Calculate Estimate</button>

            <div id="results" class="hidden"></div>

            <a href="index.html" class="back-link">Open Full Quote Tool</a>
        </div>
    </div>

    <script src="pricing-data.js"></script>
    <script src="shutter-pricing-prep.js"></script>
    <script src="estimate.js"></script>
</body>
</html>
